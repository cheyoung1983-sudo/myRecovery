<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>myRecovery Spokane</title>
    <meta name="google-adsense-account" content="REPLACE_WITH_YOUR_PUBLISHER_ID">
    <meta name="google-admob-app-id" content="REPLACE_WITH_YOUR_ADMOB_APP_ID">
    <script async src="https://securepubads.g.doubleclick.net/tag/js/gpt.js"></script>
    <script>
      window.googletag = window.googletag || {cmd: []};
      googletag.cmd.push(function() {
        googletag.defineSlot('/REPLACE_WITH_YOUR_PUBLISHER_ID/REPLACE_WITH_YOUR_BANNER_UNIT_ID', [320, 50], 'div-gpt-ad-banner').addService(googletag.pubads());
        
        // Native Ad Slot
        googletag.defineSlot('/REPLACE_WITH_YOUR_PUBLISHER_ID/REPLACE_WITH_YOUR_NATIVE_UNIT_ID', ['fluid'], 'div-gpt-ad-native').addService(googletag.pubads());

        // Rewarded Interstitial Slot
        googletag.defineOutOfPageSlot('/REPLACE_WITH_YOUR_PUBLISHER_ID/REPLACE_WITH_YOUR_REWARDED_UNIT_ID', googletag.enums.OutOfPageFormat.REWARDED).addService(googletag.pubads());

        googletag.pubads().enableSingleRequest();
        googletag.enableServices();
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
